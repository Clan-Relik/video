<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RELIK - L'Épopée (10 Ans)</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; cursor: default; }
        #video-container { position: relative; width: 100vw; height: 100vh; background: #000; }

        .slide {
            position: absolute; width: 100%; height: 100%;
            opacity: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: opacity 1.5s ease-in-out, transform 10s linear;
            transform: scale(1.1);
        }

        .slide.active { opacity: 1; transform: scale(1); }

        .slide.zoom-in { transform: scale(1); }
        .slide.zoom-in.active { transform: scale(1.1); }

        #s35 { transition: opacity 1.5s ease-in-out, transform 3.33s linear !important; }

        #play-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        button {
            padding: 20px 50px; font-size: 24px; cursor: pointer;
            background: #FFD700; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        #fire-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle, rgba(255,100,0,0.15) 0%, rgba(0,0,0,0) 70%);
            mix-blend-mode: screen; pointer-events: none; z-index: 5;
            opacity: 0; animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.05); }
        }

        .particle { position: absolute; background: #ffaa00; border-radius: 50%; pointer-events: none; z-index: 6; }

        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: none; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px;
            width: 80%; border: 1px solid rgba(255, 215, 0, 0.3);
            transition: opacity 0.5s ease; opacity: 1;
        }
        
        #controls.hidden { opacity: 0; pointer-events: none; }
        #seekbar { flex-grow: 1; cursor: pointer; accent-color: #FFD700; }
        #btnPause { background: #FFD700; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        #time-display { color: #FFD700; font-family: monospace; min-width: 50px; }
    </style>
</head>
<body>

    <div id="play-overlay">
        <button onclick="startEpic()">LANCER L'ÉPOPÉE RELIK</button>
    </div>

    <div id="fire-glow"></div>

    <audio id="music" src="musique10.mp3"></audio>

    <div id="video-container">
        <div id="s1" class="slide" style="background-image: url('1 intro relik 10 ans.png');"></div>
        <div id="s2" class="slide" style="background-image: url('2 intro relik-banniere.webp');"></div>
        <div id="s3" class="slide" style="background-image: url('3 intro.jpg');"></div>
        <div id="s4" class="slide" style="background-image: url('4 verse1-1 village petite cabane.png');"></div>
        <div id="s5" class="slide" style="background-image: url('5 verse1-2 un nom, un signe.png');"></div>
        <div id="s6" class="slide" style="background-image: url('6 verse1-3 un nom, un signe avec cleo.png');"></div>
        <div id="s7" class="slide" style="background-image: url('7 verse1-4 arrive des premiers.png');"></div>
        <div id="s8" class="slide" style="background-image: url('8 verse1-5 les premiers murs.png');"></div>
        <div id="s9" class="slide" style="background-image: url('9 Chorus1-7.0 intro.png');"></div>
        <div id="s10" class="slide" style="background-image: url('10 Chorus1 leve les verres.png');"></div>
        <div id="s11" class="slide" style="background-image: url('11 verse1-6_premier_victoire.webp');"></div>
        <div id="s12" class="slide" style="background-image: url('12 verse1-7 mur changer de pierre.jpg');"></div>
        <div id="s13" class="slide" style="background-image: url('12.1 intro relik-banniere - Copie.webp');"></div>
        <div id="s14" class="slide" style="background-image: url('13 Chorus1-9 fete grave dans pierre.png');"></div>
        <div id="s15" class="slide" style="background-image: url('14 Chorus1-10 fete clan legendaire.png');"></div>
        <div id="s16" class="slide" style="background-image: url('15_verse2-1_premiere_defaites.webp');"></div>
        <div id="s17" class="slide" style="background-image: url('16_verse2-3_discution_de_strategie.webp');"></div>
        <div id="s18" class="slide" style="background-image: url('17 verse2-6 discution de strategie.jpg');"></div>
        <div id="s19" class="slide" style="background-image: url('19 verse2-8 famille 1.png');"></div>
        <div id="s20" class="slide" style="background-image: url('20 verse2_9 famille 1.png');"></div>
        <div id="s21" class="slide" style="background-image: url('21 Chorus2-1 intro.png');"></div>
        <div id="s22" class="slide" style="background-image: url('22 Chorus2-1 2018.png');"></div>
        <div id="s23" class="slide" style="background-image: url('23 Chorus2-1 t13.png');"></div>
        <div id="s24" class="slide" style="background-image: url('24 Chorus2-1 2019.png');"></div>
        <div id="s25" class="slide" style="background-image: url('25.1 verse2-7 famille 1.png');"></div>
        <div id="s26" class="slide" style="background-image: url('26 Chorus2- 1 champion II.jpg');"></div>
        <div id="s27" class="slide" style="background-image: url('27 passationdeadpool_chef.webp');"></div>
        <div id="s28" class="slide" style="background-image: url('28 passation celebration.jpg');"></div>
        <div id="s29" class="slide" style="background-image: url('29 bridge 1-1 memoriale.webp');"></div>
        <div id="s30" class="slide" style="background-image: url('30 gros plan memorial.webp');"></div>
        <div id="s31" class="slide zoom-in" style="background-image: url('31 10 relik.png');"></div>
        <div id="s32" class="slide zoom-in" style="background-image: url('32 photo de groupe.png');"></div>
        <div id="s33" class="slide" style="background-image: url('32.1 gros plan estade.JPG');"></div>
        <div id="s35" class="slide zoom-in" style="background-image: url('35 logo clan.png');"></div>
        <div id="s36" class="slide" style="background-color: black;"></div>
    </div>

    <div id="controls">
        <button onclick="togglePlay()" id="btnPause">PAUSE</button>
        <input type="range" id="seekbar" value="0" step="0.1">
        <span id="time-display">00:00</span>
    </div>

    <script>
        const music = document.getElementById('music');
        const container = document.getElementById('video-container');
        const seekbar = document.getElementById('seekbar');
        const timeDisplay = document.getElementById('time-display');
        const btnPause = document.getElementById('btnPause');
        const controls = document.getElementById('controls');

        const timeline = [
            { time: 1,   slide: 's1' }, { time: 5,   slide: 's2' }, { time: 7,   slide: 's3' },
            { time: 13,  slide: 's4' }, { time: 19,  slide: 's5' }, { time: 21,  slide: 's6' },
            { time: 24,  slide: 's7' }, { time: 30,  slide: 's8' }, { time: 37,  slide: 's9' },
            { time: 40,  slide: 's10' }, { time: 44,  slide: 's11' }, { time: 49,  slide: 's12' },
            { time: 59,  slide: 's13' }, { time: 62,  slide: 's14' }, { time: 67,  slide: 's15' },
            { time: 70,  slide: 's16' }, { time: 74,  slide: 's17' }, { time: 78,  slide: 's18' },
            { time: 84,  slide: 's19' }, { time: 88,  slide: 's20' }, { time: 92,  slide: 's21' },
            { time: 94,  slide: 's22' }, { time: 98,  slide: 's23' }, { time: 102, slide: 's24' },
            { time: 108, slide: 's25' }, { time: 112, slide: 's26' }, { time: 116, slide: 's27' },
            { time: 120, slide: 's28' }, { time: 126, slide: 's29' }, { time: 131, slide: 's30' },
            { time: 151, slide: 's31' }, { time: 154, slide: 's32' }, { time: 157, slide: 's33' }, { time: 175, slide: 's35' },
            { time: 187, slide: 's36' }
        ];

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 60 + 20 + 'vw'; p.style.top = '100vh';
            p.style.opacity = Math.random();
            container.appendChild(p);
            p.animate([
                { transform: 'translateY(0)', opacity: 1 },
                { transform: `translateY(-100vh) translateX(${(Math.random() - 0.5) * 200}px)`, opacity: 0 }
            ], { duration: Math.random() * 3000 + 2000 }).onfinish = () => p.remove();
        }

        function startEpic() {
            document.getElementById('play-overlay').style.display = 'none';
            music.play().catch(() => console.log("Audio bloqué ou absent"));
            document.getElementById('controls').style.display = 'flex';
            setInterval(createParticle, 200);
            requestAnimationFrame(render);
        }

        music.addEventListener('timeupdate', () => {
            if (!isNaN(music.duration)) {
                seekbar.value = (music.currentTime / music.duration) * 100;
                let mins = Math.floor(music.currentTime / 60);
                let secs = Math.floor(music.currentTime % 60);
                timeDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        });

        seekbar.addEventListener('input', () => {
            music.currentTime = (seekbar.value / 100) * music.duration;
        });

        function togglePlay() {
            if (music.paused) { music.play(); btnPause.innerText = "PAUSE"; }
            else { music.pause(); btnPause.innerText = "PLAY"; }
        }

        function render() {
            const currentTime = music.currentTime;
            const currentEvent = [...timeline].reverse().find(e => currentTime >= e.time);
            if (currentEvent) {
                document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
                const activeSlide = document.getElementById(currentEvent.slide);
                if (activeSlide) activeSlide.classList.add('active');
            }
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
